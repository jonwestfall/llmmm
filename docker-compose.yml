services:
  llmmm:
    build: .
    container_name: llmmm
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      LLMMM_ENVIRONMENT: production
      LLMMM_DEBUG: "false"
      LLMMM_DATABASE_URL: sqlite:////app/data/llmmm.db
      LLMMM_ADMIN_USERNAME: admin
      LLMMM_ADMIN_PASSWORD: ${LLMMM_ADMIN_PASSWORD}
      LLMMM_ADMIN_PASSWORD_FORCE_RESET: ${LLMMM_ADMIN_PASSWORD_FORCE_RESET:-false}
      LLMMM_SESSION_SECRET: ${LLMMM_SESSION_SECRET}
      LLMMM_SECRET_KEY: ${LLMMM_SECRET_KEY}
      LLMMM_BASE_EXTERNAL_URL: ${LLMMM_BASE_EXTERNAL_URL:-http://localhost:8080}
      LLMMM_CORS_ORIGINS: ${LLMMM_CORS_ORIGINS:-}
      LLMMM_MAX_UPLOAD_MB: ${LLMMM_MAX_UPLOAD_MB:-25}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
